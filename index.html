<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapateriaPro v2.0 - Jabed</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, getDocs, onSnapshot, query, orderBy, where, getDoc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getStorage, ref, uploadString, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        // ══════════════════════════════════════
        //  🔧 REEMPLAZA ESTO CON TUS DATOS
        // ══════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyB-sKJfz-On57bKZpc-mj-mTZC-Y0QnQ9c",
            authDomain: "zapateria-jabed-df907.firebaseapp.com",
            projectId: "zapateria-jabed-df907",
            storageBucket: "zapateria-jabed-df907.firebasestorage.app",
            messagingSenderId: "556662714804",
            appId: "1:556662714804:web:1ba06de544b7df92f342e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        // Exportar a global para que las funciones del HTML lo vean
        window._fb = { 
            db, auth, storage, collection, doc, addDoc, setDoc, updateDoc, deleteDoc,
            getDocs, onSnapshot, query, orderBy, where, getDoc, writeBatch, serverTimestamp,
            signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged,
            ref, uploadString, getDownloadURL, deleteObject 
        };
    </script>

    <style>
        :root {
            --bg:#0a0a0f; --s1:#12121a; --s2:#1a1a25; --s3:#22222f; --s4:#2a2a3a;
            --border:#2e2e42; --border2:#3a3a52;
            --accent:#6c63ff; --accent2:#8b84ff; --accent-dim:#2d2a6e;
            --gold:#f0b429; --gold-dim:#5a4410;
            --cream:#e8e6f0; --muted:#7a7890; --faint:#3a3850;
            --red:#e05252; --green:#52c97a; --blue:#52a8e0; --orange:#e07a52;
            --radius:10px; --shadow:0 8px 32px rgba(0,0,0,.6);
            --font:'Outfit',sans-serif; --mono:'JetBrains Mono',monospace; --display:'Syne',sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font);background:var(--bg);color:var(--cream);min-height:100vh;overflow-x:hidden}
        
        /* ══ ESTILOS DE CARGA ══ */
        #loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
        .spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .load-logo{font-family:var(--display);font-size:26px;color:var(--accent2);letter-spacing:1px}

        /* ══ AUTH ══ */
        #auth{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 20% 80%,#1a1040 0%,var(--bg) 55%),radial-gradient(ellipse at 80% 20%,#0a1a30 0%,transparent 55%)}
        .auth-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.7)}
        .tab-btn.on{background:var(--accent);color:#fff;font-weight:600}
        .err-box{background:#2a1515;border:1px solid #5a2020;color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}

        /* ══ ESTRUCTURA APP ══ */
        #app{display:none;height:100vh;flex-direction:column}
        .topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0}
        .body-wrap{display:flex;flex:1;overflow:hidden}
        .sidebar{width:220px;background:var(--s1);border-right:1px solid var(--border);overflow-y:auto}
        .main{flex:1;overflow-y:auto;background:var(--bg)}
        .content{padding:20px 24px}
        .page{display:none}
        .page.on{display:block}

        /* ══ BOTONES Y OTROS ══ */
        .btn{padding:8px 16px;border-radius:8px;cursor:pointer;border:none;font-weight:500;transition:0.2s}
        .btn-accent{background:var(--accent);color:white}
        .card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
        .fg{margin-bottom:15px}
        label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
        input, select{width:100%;background:var(--s2);border:1px solid var(--border);padding:10px;color:white;border-radius:8px}
    </style>
</head>
<body>

    <div id="loading">
        <div class="spin"></div>
        <div class="load-logo">🥿 ZapateriaPro</div>
    </div>

    <div id="auth">
        <div class="auth-card">
            <div class="load-logo" style="margin-bottom:20px">Zapatería Jabed</div>
            <div class="err-box" id="auth-err"></div>
            <div class="fg"><label>Correo</label><input type="email" id="a-email"></div>
            <div class="fg"><label>Contraseña</label><input type="password" id="a-pass"></div>
            <button class="btn btn-accent" style="width:100%" onclick="doAuth()">Entrar al Sistema</button>
        </div>
    </div>

    <div id="app">
        <div class="topbar">
            <div class="load-logo" style="font-size:18px">ZapateriaPro</div>
            <div style="flex:1"></div>
            <button class="btn" style="background:var(--s3);color:white" onclick="doSignOut()">Cerrar Sesión</button>
        </div>
        <div class="body-wrap">
            <nav class="sidebar">
                <div style="padding:20px; color:var(--muted); font-size:12px">MENÚ</div>
                <div style="padding:10px 20px; cursor:pointer" onclick="go('dashboard')">📊 Dashboard</div>
                <div style="padding:10px 20px; cursor:pointer" onclick="go('inventario')">📦 Inventario</div>
                <div style="padding:10px 20px; cursor:pointer" onclick="go('pos')">🛒 Punto de Venta</div>
            </nav>
            <main class="main">
                <div class="content">
                    <div id="page-dashboard" class="page on">
                        <h1>Panel de Control</h1>
                        <p>Bienvenido al sistema de Zapatería Jabed.</p>
                    </div>
                    <div id="page-inventario" class="page">
                        <h1>Inventario</h1>
                        <div class="card">Aquí aparecerán tus productos.</div>
                    </div>
                    <div id="page-pos" class="page">
                        <h1>Venta</h1>
                        <div class="card">Módulo de cobro.</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const { auth, db, onAuthStateChanged, signInWithEmailAndPassword, signOut } = window._fb;

        // 1. Manejo de Sesión
        window.addEventListener('load', () => {
            onAuthStateChanged(window._fb.auth, (user) => {
                document.getElementById('loading').style.display = 'none';
                if (user) {
                    document.getElementById('auth').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                } else {
                    document.getElementById('auth').style.display = 'flex';
                    document.getElementById('app').style.display = 'none';
                }
            });
        });

        // 2. Navegación
        function go(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
            document.getElementById('page-' + pageId).classList.add('on');
        }

        // 3. Autenticación
        async function doAuth() {
            const email = document.getElementById('a-email').value;
            const pass = document.getElementById('a-pass').value;
            const errBox = document.getElementById('auth-err');
            
            try {
                await signInWithEmailAndPassword(window._fb.auth, email, pass);
            } catch (err) {
                errBox.style.display = 'block';
                errBox.innerText = "Error: " + err.message;
            }
        }

        async function doSignOut() {
            await signOut(window._fb.auth);
        }
    </script>
</body>
</html>
