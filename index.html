<div id="app">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:var(--s1); border-bottom:1px solid #2e2e42">
            <h2 style="font-family:'Syne'; font-size:18px">ZapateriaPro <span style="color:var(--accent)">Jabed</span></h2>
            <button class="btn" style="width:auto; background:#333; color:white; padding:5px 15px" onclick="window._fb.signOut(window._fb.auth)">Cerrar Sesión</button>
        </div>

        <div style="padding:20px; max-width:1000px; margin:auto">
            <h1 style="margin-bottom:20px">📦 Gestión de Inventario</h1>
            
            <div class="auth-card" style="max-width:100%; margin-bottom:30px">
                <h3 style="margin-bottom:15px; color:var(--accent)">Nuevo Producto</h3>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px">
                    <div class="fg"><label>Nombre del Zapato</label><input type="text" id="p-nombre" placeholder="Ej. Bota Vaquera Café"></div>
                    <div class="fg"><label>Categoría</label><input type="text" id="p-cat" placeholder="Ej. Dama, Caballero, Escolar"></div>
                    <div class="fg"><label>Precio de Venta ($)</label><input type="number" id="p-precio" placeholder="0.00"></div>
                    <div class="fg"><label>Stock Inicial</label><input type="number" id="p-stock" placeholder="0"></div>
                </div>
                <button class="btn btn-accent" style="margin-top:10px" onclick="guardarZapato()">Guardar en Inventario</button>
            </div>

            <div class="auth-card" style="max-width:100%">
                <h3 style="margin-bottom:15px">Productos Registrados</h3>
                <div id="lista-zapatos" style="display:grid; gap:10px">
                    <p style="color:var(--muted)">Cargando inventario...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGICA DE AUTENTICACION ---
        window.addEventListener('firebase-ready', () => {
            const { auth, onAuthStateChanged, db, collection, onSnapshot } = window._fb;
            
            onAuthStateChanged(auth, (user) => {
                document.getElementById('loading').style.display = 'none';
                if (user) {
                    document.getElementById('auth').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    cargarInventario(); // Empezar a escuchar la base de datos
                } else {
                    document.getElementById('auth').style.display = 'flex';
                    document.getElementById('app').style.display = 'none';
                }
            });
        });

        // --- FUNCIONES DE NEGOCIO ---
        async function guardarZapato() {
            const { db, collection, addDoc } = window._fb;
            const btn = document.querySelector('button[onclick="guardarZapato()"]');
            
            const nombre = document.getElementById('p-nombre').value;
            const cat = document.getElementById('p-cat').value;
            const precio = document.getElementById('p-precio').value;
            const stock = document.getElementById('p-stock').value;

            if(!nombre || !precio) return alert("Por favor llena el nombre y precio");

            btn.innerText = "Guardando...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "inventario"), {
                    nombre,
                    categoria: cat,
                    precio: parseFloat(precio),
                    stock: parseInt(stock),
                    fecha: new Date().toISOString()
                });
                
                // Limpiar campos
                document.getElementById('p-nombre').value = "";
                document.getElementById('p-precio').value = "";
                document.getElementById('p-stock').value = "";
                alert("¡Zapato guardado!");
            } catch (e) {
                alert("Error al guardar: " + e.message);
            } finally {
                btn.innerText = "Guardar en Inventario";
                btn.disabled = false;
            }
        }

        function cargarInventario() {
            const { db, collection, onSnapshot } = window._fb;
            const contenedor = document.getElementById('lista-zapatos');

            onSnapshot(collection(db, "inventario"), (snapshot) => {
                contenedor.innerHTML = "";
                if(snapshot.empty) {
                    contenedor.innerHTML = "<p style='color:var(--muted)'>No hay productos registrados aún.</p>";
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.style = "background:var(--s2); padding:15px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid #2e2e42";
                    card.innerHTML = `
                        <div>
                            <strong style="color:var(--accent)">${data.nombre}</strong><br>
                            <small style="color:var(--muted)">${data.categoria || 'Sin categoría'}</small>
                        </div>
                        <div style="text-align:right">
                            <div style="color:var(--gold); font-weight:600">$${data.precio}</div>
                            <div style="font-size:12px">${data.stock} disponibles</div>
                        </div>
                    `;
                    contenedor.appendChild(card);
                });
            });
        }

        // --- LOGICA DE LOGIN/REGISTRO (YA EXISTENTE) ---
        let modoRegistro = false;
        function cambiarModo() {
            modoRegistro = !modoRegistro;
            document.getElementById('auth-title').innerText = modoRegistro ? "Crear Cuenta" : "Zapatería Jabed";
            document.getElementById('btn-main').innerText = modoRegistro ? "Registrarme" : "Entrar al Sistema";
            document.getElementById('toggle-text').innerText = modoRegistro ? "Ya tengo cuenta, volver" : "¿No tienes cuenta? Regístrate aquí";
        }

        async function ejecutarAuth() {
            const email = document.getElementById('a-email').value;
            const pass = document.getElementById('a-pass').value;
            const errBox = document.getElementById('auth-err');
            errBox.style.display = 'none';
            try {
                if (modoRegistro) {
                    await window._fb.createUserWithEmailAndPassword(window._fb.auth, email, pass);
                } else {
                    await window._fb.signInWithEmailAndPassword(window._fb.auth, email, pass);
                }
            } catch (err) {
                errBox.style.display = 'block';
                errBox.innerText = "Error: " + err.message;
            }
        }
    </script>
