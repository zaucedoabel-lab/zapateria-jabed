<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZapateriaPro v2.0 - Jabed</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-sKJfz-On57bKZpc-mj-mTZC-Y0QnQ9c",
            authDomain: "zapateria-jabed-df907.firebaseapp.com",
            projectId: "zapateria-jabed-df907",
            storageBucket: "zapateria-jabed-df907.firebasestorage.app",
            messagingSenderId: "556662714804",
            appId: "1:556662714804:web:1ba06de544b7df92f342e1"
        };

        const app = initializeApp(firebaseConfig);
        window._fb = { db: getFirestore(app), auth: getAuth(app), collection, addDoc, onSnapshot, deleteDoc, doc, signInWithEmailAndPassword, signOut };
        window.dispatchEvent(new Event('fb-ready'));
    </script>

    <style>
        :root { --bg: #0a0a0f; --s1: #12121a; --accent: #6c63ff; --gold: #fbbf24; --text: #e8e6f0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin:0; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--s1); padding: 25px; border-right: 1px solid #2e2e42; }
        .main { flex: 1; padding: 40px; }
        
        /* Tablas Estilo Claude */
        .card { background: var(--s1); border-radius: 12px; padding: 20px; border: 1px solid #2e2e42; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #7a7890; font-size: 12px; text-transform: uppercase; padding: 12px; border-bottom: 2px solid #2e2e42; }
        td { padding: 12px; border-bottom: 1px solid #1f1f2e; }
        
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid #2e2e42; color: var(--text); }
        
        @media print { .sidebar, .btn, .no-print { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; padding: 20px; border: 2px solid black; color: black; background: white; width: 200px; text-align: center; }
    </style>
</head>
<body>

<div id="app" style="display:none">
    <div class="layout">
        <aside class="sidebar">
            <h2 style="font-family:'Syne'; color:var(--accent); margin-bottom:40px">JABED PRO</h2>
            <div style="display:grid; gap:10px">
                <button class="btn btn-outline" onclick="exportarExcel()">📊 Exportar Excel</button>
                <button class="btn btn-outline" style="color:#ff4d4d" onclick="window._fb.signOut(window._fb.auth)">Cerrar Sesión</button>
            </div>
        </aside>

        <main class="main">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
                <h1>Gestión de Inventario</h1>
                <div style="display:flex; gap:10px">
                    <input type="text" id="filtro" placeholder="Buscar calzado..." onkeyup="filtrar()" style="padding:10px; border-radius:8px; background:#1a1a25; border:1px solid #2e2e42; color:white">
                </div>
            </div>

            <div class="card">
                <h3>+ Registrar Nuevo Producto</h3>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; margin-top:15px">
                    <input type="text" id="n" placeholder="Nombre (Ej: Bota 302)">
                    <input type="text" id="c" placeholder="Categoría">
                    <input type="number" id="p" placeholder="Precio $">
                    <input type="number" id="s" placeholder="Stock">
                </div>
                <button class="btn btn-accent" style="margin-top:15px; width:100%" onclick="guardar()">Guardar Producto</button>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<div id="ticket" class="print-only">
    <h2 id="t-nombre"></h2>
    <h1 id="t-precio"></h1>
    <p>ZAPATERIA JABED</p>
</div>

<script>
    let productos = [];

    window.addEventListener('fb-ready', () => {
        window._fb.onAuthStateChanged(window._fb.auth, (user) => {
            if(user) {
                document.getElementById('app').style.display = 'block';
                const col = window._fb.collection(window._fb.db, "inventario");
                window._fb.onSnapshot(col, (snap) => {
                    productos = [];
                    const tbody = document.getElementById('tabla');
                    tbody.innerHTML = "";
                    snap.forEach(doc => {
                        const d = doc.data();
                        productos.push({id: doc.id, ...d});
                        tbody.innerHTML += `
                            <tr>
                                <td><b>${d.nombre}</b></td>
                                <td>${d.categoria}</td>
                                <td style="color:var(--gold)">$${d.precio}</td>
                                <td>${d.stock} pzas</td>
                                <td>
                                    <button class="btn btn-outline" style="padding:5px 10px; font-size:11px" onclick="imprimirEtiqueta('${d.nombre}', '${d.precio}')">🏷️ Etiqueta</button>
                                    <button class="btn btn-outline" style="padding:5px 10px; font-size:11px; color:red" onclick="eliminar('${doc.id}')">🗑️</button>
                                </td>
                            </tr>`;
                    });
                });
            } else { window.location.href = "/"; }
        });
    });

    async function guardar() {
        const data = {
            nombre: document.getElementById('n').value,
            categoria: document.getElementById('c').value,
            precio: document.getElementById('p').value,
            stock: document.getElementById('s').value
        };
        await window._fb.addDoc(window._fb.collection(window._fb.db, "inventario"), data);
        alert("¡Guardado!");
    }

    function imprimirEtiqueta(nombre, precio) {
        document.getElementById('t-nombre').innerText = nombre;
        document.getElementById('t-precio').innerText = "$" + precio;
        window.print();
    }

    function exportarExcel() {
        let csv = "Nombre,Categoria,Precio,Stock\n";
        productos.forEach(p => { csv += `${p.nombre},${p.categoria},${p.precio},${p.stock}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'Inventario_Jabed_2026.csv');
        a.click();
    }

    async function eliminar(id) { if(confirm("¿Borrar?")) await window._fb.deleteDoc(window._fb.doc(window._fb.db, "inventario", id)); }
</script>
</body>
</html>
